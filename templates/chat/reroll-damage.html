<form>
  <p>Choose how many failed dice to reroll for each target (0 to skip).</p>
  {{#each targets as |t|}}
  <div class="form-group">
    <label>{{t.name}} (up to {{t.failedCount}})</label>
    <input type="number" name="count_{{t.index}}" value="0" min="0" max="{{t.failedCount}}"/>
  </div>
  {{/each}}
</form>
