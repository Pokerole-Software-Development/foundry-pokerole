name: Build and Official Release

on:
  workflow_dispatch:
    inputs:
      enable_gulp:
        description: 'Run Gulp build?'
        type: boolean
        default: true

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
      
      # Conditional Gulp Step
      - name: Install NPM Dependencies and Run Gulp
        if: ${{ inputs.enable_gulp == true }}
        run: |
          npm install
          npx gulp build

      - name: Checkout Assets Repository
        uses: actions/checkout@v4
        with:
          repository: 'Pokerole-Software-Development/Pokerole-Data' 
          path: 'assets-repo' 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
      - name: Install Python Dependencies
        run: pip install fire pyyaml pandas
      - name: Fetch Updated Databases
        working-directory: ./assets-repo/scripts/databuilder
        run: |
          python builder.py buildFoundry --game_version="v3.0"

      # Extract Version from system.json for the Release Name
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' system.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Stage Release Files
        run: |
          mkdir release_stage
          mv css lang module templates images release_stage/
          mv template.json package.json package-lock.json system.json release_stage/
          mv assets-repo/FoundryModule/packs release_stage/
          mkdir -p release_stage/images/
          mv assets-repo/FoundryModule/images/items release_stage/images/
          mkdir -p release_stage/images/pokemon/{book,box,home,items,shuffle}
          mv assets-repo/FoundryModule/images/book/. release_stage/images/pokemon/book/
          mv assets-repo/images/BoxSprites/. release_stage/images/pokemon/box/
          mv assets-repo/images/HomeSprites/. release_stage/images/pokemon/home/
          mv assets-repo/images/ItemSprites/. release_stage/images/pokemon/items/
          mv assets-repo/images/ShuffleTokens/. release_stage/images/pokemon/shuffle/

      - name: Create Zip Archive
        run: |
          ZIP_NAME="PokeroleModule.zip"
          cd release_stage
          zip -r ../$ZIP_NAME .
          cd ..
          echo "ZIP_FILE_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-${{ github.run_number }}
          # Custom release name format
          name: 'Pokerole ${{ env.VERSION }} Build ${{ github.run_number }}'
          prerelease: false
          make_latest: true
          files: ${{ env.ZIP_FILE_NAME }}
