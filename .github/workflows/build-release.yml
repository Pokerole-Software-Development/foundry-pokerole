name: Build and Official Release

on:
  workflow_dispatch:
    inputs:
      enable_gulp:
        description: 'Run Gulp build?'
        type: boolean
        default: true
      release_type:
          description: 'What kind of build is this?'
          type: choice
          options:
            - release
            - prerelease
            - legacy
            - develop
          default: release
      asset_repo:
          description: 'Which assets repository to build from?'
          type: choice
          options:
            - POKEROLE DATA
            - AXORUM DEV
          default: POKEROLE DATA

permissions:
  contents: write

env:
  ASSET_REPOS: |
    {
      "POKEROLE DATA": "https://github.com/Pokerole-Software-Development/Pokerole-Data",
      "AXORUM DEV": "https://github.com/Axorum/Pokerole-Data.git"
    }

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
      
      # Conditional Gulp Step
      - name: Install NPM Dependencies and Run Gulp
        if: ${{ inputs.enable_gulp == true }}
        run: |
          npm install
          npx gulp build

      - name: Resolve Assets Repository
        run: |
          URL="${{ fromJSON(env.ASSET_REPOS)[inputs.asset_repo] }}"
          # Strip the https://github.com/ prefix and an optional trailing .git suffix - actions/checkout
          # wants a plain owner/repo slug, not a full URL.
          SLUG="${URL#https://github.com/}"
          echo "ASSETS_REPO_SLUG=${SLUG%.git}" >> $GITHUB_ENV

      - name: Checkout Assets Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ASSETS_REPO_SLUG }}
          path: 'assets-repo'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
      - name: Install Python Dependencies
        run: pip install fire pyyaml pandas
      - name: Fetch Updated Databases
        working-directory: ./assets-repo/scripts/databuilder
        run: |
          python builder.py buildFoundry --game_version="v3.0"

      # Extract Version from system.json for the Release Name
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' system.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set Release Names
        id: set_names
        run: |
          case "${{ inputs.release_type }}" in
            prerelease)
              # Fixed tag/asset names so the manifest URL below never changes between pre-release builds.
              echo "RELEASE_TYPE=Pre-Release" >> $GITHUB_ENV
              echo "RELEASE_TAG=prerelease" >> $GITHUB_ENV
              echo "IS_PRERELEASE=true" >> $GITHUB_ENV
              echo "MAKE_LATEST=false" >> $GITHUB_ENV
              echo "PIN_MANIFEST=true" >> $GITHUB_ENV
              echo "MANIFEST_URL=https://github.com/${{ github.repository }}/releases/download/prerelease/system.json" >> $GITHUB_ENV
              echo "DOWNLOAD_URL=https://github.com/${{ github.repository }}/releases/download/prerelease/PokeroleModule.zip" >> $GITHUB_ENV
              echo "PATCH_VERSION=${VERSION}-pre.${{ github.run_number }}" >> $GITHUB_ENV
              echo "PATCH_DESC_PREFIX=⚠️ PRE-RELEASE BUILD — for testing only, may be unstable. " >> $GITHUB_ENV
              ;;
            legacy)
              # Version-pinned tag that's never touched by "release" or "prerelease" builds, so this
              # exact version stays permanently installable at the same manifest URL.
              echo "RELEASE_TYPE=Legacy" >> $GITHUB_ENV
              echo "RELEASE_TAG=v${VERSION}-legacy" >> $GITHUB_ENV
              echo "IS_PRERELEASE=false" >> $GITHUB_ENV
              echo "MAKE_LATEST=false" >> $GITHUB_ENV
              echo "PIN_MANIFEST=true" >> $GITHUB_ENV
              echo "MANIFEST_URL=https://github.com/${{ github.repository }}/releases/download/v${VERSION}-legacy/system.json" >> $GITHUB_ENV
              echo "DOWNLOAD_URL=https://github.com/${{ github.repository }}/releases/download/v${VERSION}-legacy/PokeroleModule.zip" >> $GITHUB_ENV
              echo "PATCH_VERSION=${VERSION}-legacy" >> $GITHUB_ENV
              echo "PATCH_DESC_PREFIX=🔒 LEGACY BUILD — pinned to v${VERSION}, will not receive further updates. " >> $GITHUB_ENV
              ;;
            develop)
              # Same pinned-manifest mechanism as prerelease, but installs as a SEPARATE Foundry system
              # (see PATCH_ID below) so it can coexist with a Release/Pre-Release install at the same time.
              echo "RELEASE_TYPE=Develop" >> $GITHUB_ENV
              echo "RELEASE_TAG=develop" >> $GITHUB_ENV
              echo "IS_PRERELEASE=true" >> $GITHUB_ENV
              echo "MAKE_LATEST=false" >> $GITHUB_ENV
              echo "PIN_MANIFEST=true" >> $GITHUB_ENV
              echo "MANIFEST_URL=https://github.com/${{ github.repository }}/releases/download/develop/system.json" >> $GITHUB_ENV
              echo "DOWNLOAD_URL=https://github.com/${{ github.repository }}/releases/download/develop/PokeroleModule.zip" >> $GITHUB_ENV
              echo "PATCH_VERSION=dev-${{ github.run_number }}" >> $GITHUB_ENV
              echo "PATCH_DESC_PREFIX=🚧 DEVELOP BUILD — continuously updated with in-progress features, expect instability. " >> $GITHUB_ENV
              echo "PATCH_ID=pokerole-dev" >> $GITHUB_ENV
              ;;
            *)
              echo "RELEASE_TYPE=Release" >> $GITHUB_ENV
              echo "RELEASE_TAG=v${VERSION}-release.${{ github.run_number }}" >> $GITHUB_ENV
              echo "IS_PRERELEASE=false" >> $GITHUB_ENV
              echo "MAKE_LATEST=true" >> $GITHUB_ENV
              echo "PIN_MANIFEST=false" >> $GITHUB_ENV
              ;;
          esac

      - name: Stage Release Files
        run: |
          mkdir release_stage
          
          # Copy everything into the staging directory
          cp -r css lang module templates images release_stage/
          cp template.json package.json package-lock.json system.json release_stage/
          
          # Add the packs folder
          cp -r assets-repo/FoundryModule/packs release_stage/
          
          # Setup images structure
          mkdir -p release_stage/images/
          cp -r assets-repo/FoundryModule/images/items release_stage/images/
          
          # Pokemon subfolders
          mkdir -p release_stage/images/pokemon/{book,box,home,items,shuffle}
          
          cp -r assets-repo/FoundryModule/images/book/. release_stage/images/pokemon/book/
          cp -r assets-repo/images/BoxSprites/. release_stage/images/pokemon/box/
          cp -r assets-repo/images/HomeSprites/. release_stage/images/pokemon/home/
          cp -r assets-repo/images/ItemSprites/. release_stage/images/pokemon/items/
          cp -r assets-repo/images/ShuffleTokens/. release_stage/images/pokemon/shuffle/

      # Point the staged manifest at the fixed/pinned download location for this build, and mark
      # its version/description distinctly so it's never confused with a normal release.
      - name: Patch Manifest for Pinned Build
        if: ${{ env.PIN_MANIFEST == 'true' }}
        run: |
          ORIG_DESC=$(jq -r '.description' release_stage/system.json)
          jq --arg m "$MANIFEST_URL" --arg d "$DOWNLOAD_URL" --arg v "$PATCH_VERSION" \
            --arg desc "${PATCH_DESC_PREFIX}${ORIG_DESC}" \
            '.manifest = $m | .download = $d | .version = $v | .description = $desc' \
            release_stage/system.json > release_stage/system.tmp.json
          mv release_stage/system.tmp.json release_stage/system.json

          if [ -n "$PATCH_ID" ]; then
            # Fork this build into a separate Foundry system id, and repoint every compendium
            # pack's "system" field to match (packs won't load under the wrong system id).
            jq --arg id "$PATCH_ID" '.id = $id | .packs |= map(.system = $id)' \
              release_stage/system.json > release_stage/system.tmp.json
            mv release_stage/system.tmp.json release_stage/system.json
          fi

      - name: Load Release Notes
        run: |
          if [ "${{ inputs.release_type }}" == "develop" ]; then
            NOTES="🚧 Automated Develop build — continuously updated with in-progress features. No detailed changelog for this build type; see the commit history for what changed."
          else
            NOTES=$(cat release_notes.md)
          fi
          if [ "$PIN_MANIFEST" == "true" ]; then
            NOTES=$(printf '%s\n\n## Installing this %s Build\nPaste this Manifest URL into the Foundry Install System dialog:\n`%s`\n' "$NOTES" "$RELEASE_TYPE" "$MANIFEST_URL")
          fi
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Zip Archive
        run: |
          ZIP_NAME="PokeroleModule.zip"
          cd release_stage
          zip -r ../$ZIP_NAME .
          cd ..
          echo "ZIP_FILE_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Determine Release Files
        run: |
          if [ "$PIN_MANIFEST" == "true" ]; then
            {
              echo "RELEASE_FILES<<EOF"
              echo "$ZIP_FILE_NAME"
              echo "release_stage/system.json"
              echo "EOF"
            } >> $GITHUB_ENV
          else
            echo "RELEASE_FILES=$ZIP_FILE_NAME" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 'Pokerole ${{ env.VERSION }} ${{ env.RELEASE_TYPE }} Build ${{ github.run_number }}'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          make_latest: ${{ env.MAKE_LATEST == 'true' }}
          files: ${{ env.RELEASE_FILES }}
          body: "${{ env.RELEASE_NOTES }}"
          generate_release_notes: true
